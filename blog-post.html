    <script src="script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            loadBlogPost();
        });
        
        async function loadBlogPost() {
            const urlParams = new URLSearchParams(window.location.search);
            const postId = urlParams.get('post');
            
            if (!postId) {
                window.location.href = 'blog.html';
                return;
            }
            
            try {
                const response = await fetch(`blog/${postId}.md`);
                if (!response.ok) throw new Error('Post not found');
                
                const markdown = await response.text();
                renderBlogPost(postId, markdown);
            } catch (error) {
                document.getElementById('blogPostContent').innerHTML = '<p>Blog post not found.</p>';
            }
        }
        
        function renderBlogPost(postId, markdown) {
            const lines = markdown.split('\n');
            let title = '';
            let date = '';
            let category = '';
            let contentStart = 0;
            
            for (let i = 0; i < lines.length; i++) {
                const line = lines[i];
                if (line.startsWith('# ')) {
                    title = line.substring(2);
                } else if (line.includes('Published:')) {
                    date = line.replace(/\*|Published:/g, '').trim();
                } else if (line.includes('Category:')) {
                    category = line.replace(/\*|Category:/g, '').trim();
                    contentStart = i + 1;
                }
                if (title && date && category) break;
            }
            
            const content = lines.slice(contentStart).join('\n');
            
            document.title = `${title} | Ayan Chattopadhyay`;
            document.getElementById('blogPostTitle').textContent = title;
            document.getElementById('blogPostDate').textContent = date;
            document.getElementById('blogPostCategory').textContent = category.toUpperCase();
            
            const heroImage = document.getElementById('blogPostHeroImage');
            const imageClass = getCategoryImageClass(category.toLowerCase());
            heroImage.className = `blog-post-hero-image ${imageClass}`;
            heroImage.innerHTML = getBlogIcon(category.toLowerCase());
            
            const contentEl = document.getElementById('blogPostContent');
            if (typeof marked !== 'undefined') {
                contentEl.innerHTML = marked.parse(content);
                
                contentEl.querySelectorAll('pre code').forEach((block) => {
                    if (typeof hljs !== 'undefined') {
                        hljs.highlightElement(block);
                    }
                    addCopyButton(block.parentElement);
                });
                
                if (typeof renderMathInElement === 'function') {
                    renderMathInElement(contentEl, {
                        delimiters: [
                            { left: '$$', right: '$$', display: true },
                            { left: '$', right: '$', display: false },
                            { left: '\\[', right: '\\]', display: true },
                            { left: '\\(', right: '\\)', display: false }
                        ]
                    });
                }
            }
        }
        
        function getCategoryImageClass(category) {
            const classes = {
                'ai': 'blog-hero-ai',
                'machine learning': 'blog-hero-ml',
                'ml': 'blog-hero-ml',
                'mathematics': 'blog-hero-math',
                'math': 'blog-hero-math',
                'systems': 'blog-hero-systems'
            };
            return classes[category] || 'blog-hero-ai';
        }
        
        function getBlogIcon(category) {
            const icons = {
                'ai': `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <circle cx="12" cy="12" r="3"></circle>
                    <path d="M12 1v4M12 19v4M4.22 4.22l2.83 2.83M16.95 16.95l2.83 2.83M1 12h4M19 12h4M4.22 19.78l2.83-2.83M16.95 7.05l2.83-2.83"></path>
                </svg>`,
                'ml': `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path>
                    <polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline>
                    <line x1="12" y1="22.08" x2="12" y2="12"></line>
                </svg>`,
                'machine learning': `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path>
                    <polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline>
                    <line x1="12" y1="22.08" x2="12" y2="12"></line>
                </svg>`,
                'math': `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline>
                </svg>`,
                'mathematics': `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline>
                </svg>`,
                'systems': `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <rect x="2" y="3" width="20" height="14" rx="2" ry="2"></rect>
                    <line x1="8" y1="21" x2="16" y2="21"></line>
                    <line x1="12" y1="17" x2="12" y2="21"></line>
                </svg>`
            };
            return icons[category] || icons['ai'];
        }
        
        function addCopyButton(preElement) {
            const wrapper = document.createElement('div');
            wrapper.className = 'code-block-wrapper';
            preElement.parentNode.insertBefore(wrapper, preElement);
            wrapper.appendChild(preElement);
            
            const copyBtn = document.createElement('button');
            copyBtn.className = 'code-copy-btn';
            copyBtn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
            </svg>`;
            copyBtn.title = 'Copy code';
            
            copyBtn.addEventListener('click', async () => {
                const code = preElement.querySelector('code').textContent;
                await navigator.clipboard.writeText(code);
                copyBtn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polyline points="20 6 9 17 4 12"></polyline>
                </svg>`;
                copyBtn.classList.add('copied');
                setTimeout(() => {
                    copyBtn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                        <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                    </svg>`;
                    copyBtn.classList.remove('copied');
                }, 2000);
            });
            
            wrapper.appendChild(copyBtn);
        }
    </script>
