    <script>
        document.addEventListener('DOMContentLoaded', () => {
            loadBlogPost();
        });
        
        async function loadBlogPost() {
            const urlParams = new URLSearchParams(window.location.search);
            const postId = urlParams.get('post');
            
            if (!postId) {
                window.location.href = 'blog.html';
                return;
            }
            
            try {
                const response = await fetch(`blog/${postId}/index.md`);
                if (!response.ok) throw new Error('Post not found');
                
                const markdown = await response.text();
                renderBlogPost(postId, markdown);
            } catch (error) {
                document.getElementById('blogPostContent').innerHTML = '<p>Blog post not found.</p>';
            }
        }
        
        function renderBlogPost(postId, markdown) {
            const lines = markdown.split('\n');
            let title = '';
            let date = '';
            let category = '';
            let contentStart = 0;
            
            for (let i = 0; i < lines.length; i++) {
                const line = lines[i];
                if (line.startsWith('# ')) {
                    title = line.substring(2);
                } else if (line.includes('Published:')) {
                    date = line.replace(/\*|Published:/g, '').trim();
                } else if (line.includes('Category:')) {
                    category = line.replace(/\*|Category:/g, '').trim();
                    contentStart = i + 1;
                }
                if (title && date && category) break;
            }
            
            const content = lines.slice(contentStart).join('\n');
            console.log('Content to parse:', content.substring(0, 500));
            
            document.title = `${title} | Ayan Chattopadhyay`;
            document.getElementById('blogPostTitle').textContent = title;
            document.getElementById('blogPostDate').textContent = date;
            document.getElementById('blogPostCategory').textContent = category.toUpperCase();
            
            const contentEl = document.getElementById('blogPostContent');
            const basePath = `blog/${postId}/`;
            
            if (typeof marked !== 'undefined') {
                // Parse markdown
                contentEl.innerHTML = marked.parse(content);
                
                // Fix relative image paths
                contentEl.querySelectorAll('img').forEach(img => {
                    const src = img.getAttribute('src');
                    console.log('Image found:', src, '-> basePath:', basePath);
                    if (src && !src.startsWith('http') && !src.startsWith('/')) {
                        img.src = basePath + src;
                        console.log('Updated to:', img.src);
                    }
                });
                
                // Process collapsible sections
                processCollapsibles(contentEl);
                
                // Process PDF/PPT embeds
                processEmbeds(contentEl, basePath);
                
                // Syntax highlighting
                contentEl.querySelectorAll('pre code').forEach((block) => {
                    if (typeof hljs !== 'undefined') {
                        hljs.highlightElement(block);
                    }
                });
                
                // Math rendering
                if (typeof renderMathInElement === 'function') {
                    renderMathInElement(contentEl, {
                        delimiters: [
                            { left: '$$', right: '$$', display: true },
                            { left: '$', right: '$', display: false },
                            { left: '\\[', right: '\\]', display: true },
                            { left: '\\(', right: '\\)', display: false }
                        ]
                    });
                }
            }
        }
        
        function processCollapsibles(container) {
            const paragraphs = Array.from(container.querySelectorAll('p'));
            
            for (let i = 0; i < paragraphs.length; i++) {
                const p = paragraphs[i];
                const text = p.textContent.trim();
                
                if (text.startsWith('???') && text.length > 3) {
                    const title = text.substring(3).trim();
                    
                    const details = document.createElement('details');
                    details.className = 'collapsible-section';
                    
                    const summary = document.createElement('summary');
                    summary.textContent = title;
                    details.appendChild(summary);
                    
                    const contentDiv = document.createElement('div');
                    contentDiv.className = 'collapsible-content';
                    
                    // Move siblings into contentDiv until we find closing ???
                    let next = p.nextElementSibling;
                    while (next) {
                        if (next.tagName === 'P' && next.textContent.trim() === '???') {
                            next.remove();
                            break;
                        }
                        const toMove = next;
                        next = next.nextElementSibling;
                        contentDiv.appendChild(toMove);
                    }
                    
                    details.appendChild(contentDiv);
                    p.replaceWith(details);
                }
            }
        }
        
        function processEmbeds(container, basePath) {
            const paragraphs = Array.from(container.querySelectorAll('p'));
            
            paragraphs.forEach(p => {
                const text = p.textContent.trim();
                
                // !pdf[file.pdf] or !pdf-full[file.pdf]
                let match = text.match(/^!pdf(-full)?\[(.+?)\]$/);
                if (match) {
                    const isHalf = !match[1];
                    const filename = match[2];
                    const div = document.createElement('div');
                    div.className = 'embed-container ' + (isHalf ? 'embed-half' : 'embed-full');
                    div.innerHTML = `<iframe src="${basePath}${filename}"></iframe>`;
                    p.replaceWith(div);
                    return;
                }
                
                // !ppt[file.pptx] or !ppt-full[file.pptx]
                match = text.match(/^!ppt(-full)?\[(.+?)\]$/);
                if (match) {
                    const isHalf = !match[1];
                    const filename = match[2];
                    const fullUrl = window.location.origin + '/' + basePath + filename;
                    const div = document.createElement('div');
                    div.className = 'embed-container ' + (isHalf ? 'embed-half' : 'embed-full');
                    div.innerHTML = `<iframe src="https://view.officeapps.live.com/op/embed.aspx?src=${encodeURIComponent(fullUrl)}"></iframe>`;
                    p.replaceWith(div);
                }
            });
        }
    </script>
