    <script src="script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            loadProject();
        });
        
        async function loadProject() {
            const urlParams = new URLSearchParams(window.location.search);
            const projectId = urlParams.get('id');
            
            if (!projectId) {
                window.location.href = 'projects.html';
                return;
            }
            
            try {
                const response = await fetch(`projects/${projectId}/index.md`);
                if (!response.ok) throw new Error('Project not found');
                
                const markdown = await response.text();
                renderProject(projectId, markdown);
            } catch (error) {
                document.getElementById('projectReadmeContent').innerHTML = '<p>Project not found.</p>';
            }
        }
        
        function renderProject(projectId, markdown) {
            const lines = markdown.split('\n');
            let title = '';
            let category = '';
            let github = '';
            let technologies = [];
            let contentStart = 0;
            
            for (let i = 0; i < lines.length; i++) {
                const line = lines[i];
                if (line.startsWith('# ')) {
                    title = line.substring(2);
                } else if (line.includes('Category:')) {
                    category = line.replace(/\*|Category:/g, '').trim();
                } else if (line.includes('GitHub:')) {
                    github = line.replace(/\*|GitHub:/g, '').trim();
                } else if (line.includes('Technologies:')) {
                    technologies = line.replace(/\*|Technologies:/g, '').trim().split(',').map(t => t.trim());
                    contentStart = i + 1;
                }
                if (title && category && github && technologies.length) break;
            }
            
            const content = lines.slice(contentStart).join('\n');
            
            if (title) document.title = `${title} | Ayan Chattopadhyay`;
            
            const titleEl = document.getElementById('projectTitle');
            if (titleEl) titleEl.textContent = title || 'Untitled Project';
            
            const categoryEl = document.getElementById('projectCategory');
            if (categoryEl) categoryEl.textContent = category.toUpperCase();
            
            const techEl = document.getElementById('projectTech');
            if (techEl && technologies.length) {
                techEl.innerHTML = technologies.map(t => 
                    `<span class="tech-badge">${t}</span>`
                ).join('');
            }
            
            const githubEl = document.getElementById('projectGithub');
            if (githubEl && github) {
                githubEl.innerHTML = `<a href="${github}" target="_blank">
                    <svg viewBox="0 0 24 24" fill="currentColor" width="18" height="18">
                        <path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/>
                    </svg>
                    View on GitHub
                </a>`;
            }
            
            const contentEl = document.getElementById('projectReadmeContent');
            const basePath = `projects/${projectId}/`;
            
            if (typeof marked !== 'undefined') {
                // Parse markdown
                contentEl.innerHTML = marked.parse(content);
                
                // Fix relative image paths
                contentEl.querySelectorAll('img').forEach(img => {
                    const src = img.getAttribute('src');
                    if (src && !src.startsWith('http') && !src.startsWith('/')) {
                        img.src = basePath + src;
                    }
                });
                
                // Process collapsible sections
                processCollapsibles(contentEl);
                
                // Process PDF/PPT embeds
                processEmbeds(contentEl, basePath);
                
                // Syntax highlighting
                contentEl.querySelectorAll('pre code').forEach((block) => {
                    if (typeof hljs !== 'undefined') {
                        hljs.highlightElement(block);
                    }
                });
                
                // Math rendering
                if (typeof renderMathInElement === 'function') {
                    renderMathInElement(contentEl, {
                        delimiters: [
                            { left: '$$', right: '$$', display: true },
                            { left: '$', right: '$', display: false },
                            { left: '\\[', right: '\\]', display: true },
                            { left: '\\(', right: '\\)', display: false }
                        ]
                    });
                }
            }
        }
        
        function processCollapsibles(container) {
            const paragraphs = Array.from(container.querySelectorAll('p'));
            
            for (let i = 0; i < paragraphs.length; i++) {
                const p = paragraphs[i];
                const text = p.textContent.trim();
                
                if (text.startsWith('???') && text.length > 3) {
                    const title = text.substring(3).trim();
                    
                    const details = document.createElement('details');
                    details.className = 'collapsible-section';
                    
                    const summary = document.createElement('summary');
                    summary.textContent = title;
                    details.appendChild(summary);
                    
                    const contentDiv = document.createElement('div');
                    contentDiv.className = 'collapsible-content';
                    
                    // Move siblings into contentDiv until we find closing ???
                    let next = p.nextElementSibling;
                    while (next) {
                        if (next.tagName === 'P' && next.textContent.trim() === '???') {
                            next.remove();
                            break;
                        }
                        const toMove = next;
                        next = next.nextElementSibling;
                        contentDiv.appendChild(toMove);
                    }
                    
                    details.appendChild(contentDiv);
                    p.replaceWith(details);
                }
            }
        }
        
        function processEmbeds(container, basePath) {
            const paragraphs = Array.from(container.querySelectorAll('p'));
            
            paragraphs.forEach(p => {
                const text = p.textContent.trim();
                
                // !pdf[file.pdf] or !pdf-full[file.pdf]
                let match = text.match(/^!pdf(-full)?\[(.+?)\]$/);
                if (match) {
                    const isFull = !!match[1];
                    const filename = match[2];
                    const div = document.createElement('div');
                    div.className = 'embed-container' + (isFull ? ' embed-full' : '');
                    div.innerHTML = `<iframe src="${basePath}${filename}"></iframe>`;
                    p.replaceWith(div);
                    return;
                }
                
                // !ppt[file.pptx] or !ppt-full[file.pptx]
                match = text.match(/^!ppt(-full)?\[(.+?)\]$/);
                if (match) {
                    const isFull = !!match[1];
                    const filename = match[2];
                    const fullUrl = window.location.origin + '/' + basePath + filename;
                    const div = document.createElement('div');
                    div.className = 'embed-container' + (isFull ? ' embed-full' : '');
                    div.innerHTML = `<iframe src="https://view.officeapps.live.com/op/embed.aspx?src=${encodeURIComponent(fullUrl)}"></iframe>`;
                    p.replaceWith(div);
                }
            });
            
            // Wrap consecutive embed-containers in embed-row divs
            const embeds = Array.from(container.querySelectorAll('.embed-container:not(.embed-full)'));
            let i = 0;
            while (i < embeds.length) {
                const current = embeds[i];
                const next = current.nextElementSibling;
                
                // Check if next sibling is also an embed (not full)
                if (next && next.classList.contains('embed-container') && !next.classList.contains('embed-full')) {
                    const row = document.createElement('div');
                    row.className = 'embed-row';
                    current.parentNode.insertBefore(row, current);
                    row.appendChild(current);
                    row.appendChild(next);
                    i += 2;
                } else {
                    // Single embed, still wrap in row for consistent styling
                    const row = document.createElement('div');
                    row.className = 'embed-row';
                    current.parentNode.insertBefore(row, current);
                    row.appendChild(current);
                    i++;
                }
            }
        }
    </script>
