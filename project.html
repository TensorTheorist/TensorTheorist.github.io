    <script src="script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            loadProject();
        });
        
        async function loadProject() {
            const urlParams = new URLSearchParams(window.location.search);
            const projectId = urlParams.get('id');
            
            if (!projectId) {
                window.location.href = 'projects.html';
                return;
            }
            
            try {
                const response = await fetch(`projects/${projectId}.md`);
                if (!response.ok) throw new Error('Project not found');
                
                const markdown = await response.text();
                renderProject(projectId, markdown);
            } catch (error) {
                document.getElementById('projectReadmeContent').innerHTML = '<p>Project not found.</p>';
            }
        }
        
        function renderProject(projectId, markdown) {
            const lines = markdown.split('\n');
            let title = '';
            let category = '';
            let github = '';
            let technologies = [];
            let contentStart = 0;
            
            for (let i = 0; i < lines.length; i++) {
                const line = lines[i];
                if (line.startsWith('# ')) {
                    title = line.substring(2);
                } else if (line.includes('Category:')) {
                    category = line.replace(/\*|Category:/g, '').trim();
                } else if (line.includes('GitHub:')) {
                    github = line.replace(/\*|GitHub:/g, '').trim();
                } else if (line.includes('Technologies:')) {
                    technologies = line.replace(/\*|Technologies:/g, '').trim().split(',').map(t => t.trim());
                    contentStart = i + 1;
                }
                if (title && category && github && technologies.length) break;
            }
            
            const content = lines.slice(contentStart).join('\n');
            
            if (title) document.title = `${title} | Ayan Chattopadhyay`;
            
            const titleEl = document.getElementById('projectTitle');
            if (titleEl) titleEl.textContent = title || 'Untitled Project';
            
            const categoryEl = document.getElementById('projectCategory');
            if (categoryEl) categoryEl.textContent = category.toLowerCase();
            
            const techEl = document.getElementById('projectTech');
            if (techEl && technologies.length) {
                techEl.innerHTML = technologies.map(t => 
                    `<span class="tech-badge">${t}</span>`
                ).join('');
            }
            
            const githubEl = document.getElementById('projectGithub');
            if (githubEl && github) {
                githubEl.innerHTML = `<a href="${github}" target="_blank">github.com →</a>`;
            }
            
            const contentEl = document.getElementById('projectReadmeContent');
            if (typeof marked !== 'undefined') {
                contentEl.innerHTML = marked.parse(content);
                
                contentEl.querySelectorAll('pre code').forEach((block) => {
                    if (typeof hljs !== 'undefined') {
                        hljs.highlightElement(block);
                    }
                    addCopyButton(block.parentElement);
                });
                
                if (typeof renderMathInElement === 'function') {
                    renderMathInElement(contentEl, {
                        delimiters: [
                            { left: '$$', right: '$$', display: true },
                            { left: '$', right: '$', display: false },
                            { left: '\\[', right: '\\]', display: true },
                            { left: '\\(', right: '\\)', display: false }
                        ]
                    });
                }
            }
        }
        
        function addCopyButton(preElement) {
            const wrapper = document.createElement('div');
            wrapper.className = 'code-block-wrapper';
            preElement.parentNode.insertBefore(wrapper, preElement);
            wrapper.appendChild(preElement);
            
            const copyBtn = document.createElement('button');
            copyBtn.className = 'code-copy-btn';
            copyBtn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
            </svg>`;
            copyBtn.title = 'Copy code';
            
            copyBtn.addEventListener('click', async () => {
                const code = preElement.querySelector('code').textContent;
                await navigator.clipboard.writeText(code);
                copyBtn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polyline points="20 6 9 17 4 12"></polyline>
                </svg>`;
                copyBtn.classList.add('copied');
                setTimeout(() => {
                    copyBtn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                        <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                    </svg>`;
                    copyBtn.classList.remove('copied');
                }, 2000);
            });
            
            wrapper.appendChild(copyBtn);
        }
    </script>
