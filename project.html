    <script src="script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            loadProject();
        });
        
        async function loadProject() {
            const urlParams = new URLSearchParams(window.location.search);
            const projectId = urlParams.get('id');
            
            if (!projectId) {
                window.location.href = 'projects.html';
                return;
            }
            
            try {
                const response = await fetch(`projects/${projectId}.md`);
                if (!response.ok) throw new Error('Project not found');
                
                const markdown = await response.text();
                renderProject(projectId, markdown);
            } catch (error) {
                console.error('Error loading project:', error);
                document.getElementById('projectReadmeContent').innerHTML = '<p>Project not found.</p>';
            }
        }
        
        function renderProject(projectId, markdown) {
            const lines = markdown.split('\n');
            let title = '';
            let category = '';
            let github = '';
            let technologies = [];
            let contentStart = 0;
            
            for (let i = 0; i < lines.length; i++) {
                const line = lines[i];
                if (line.startsWith('# ')) {
                    title = line.substring(2);
                } else if (line.includes('Category:')) {
                    category = line.replace(/\*|Category:/g, '').trim();
                } else if (line.includes('GitHub:')) {
                    github = line.replace(/\*|GitHub:/g, '').trim();
                } else if (line.includes('Technologies:')) {
                    technologies = line.replace(/\*|Technologies:/g, '').trim().split(',').map(t => t.trim());
                    contentStart = i + 1;
                }
                if (title && category && github && technologies.length) break;
            }
            
            const content = lines.slice(contentStart).join('\n');
            
            if (title) document.title = `${title} | Ayan Chattopadhyay`;
            
            const titleEl = document.getElementById('projectTitle');
            if (titleEl) titleEl.textContent = title || 'Untitled Project';
            
            const categoryEl = document.getElementById('projectCategory');
            if (categoryEl) categoryEl.textContent = (category || 'PROJECT').toUpperCase();
            
            const heroImage = document.getElementById('projectHeroImage');
            if (heroImage) {
                const imageType = getProjectImageType(projectId);
                heroImage.className = `project-page-hero-image project-hero-${imageType}`;
                heroImage.innerHTML = getProjectIcon(imageType);
            }
            
            const techEl = document.getElementById('projectTech');
            if (techEl && technologies.length) {
                techEl.innerHTML = technologies.map(t => 
                    `<span class="tech-badge">${t}</span>`
                ).join('');
            }
            
            const githubEl = document.getElementById('projectGithub');
            if (githubEl && github) {
                githubEl.innerHTML = `
                <a href="${github}" target="_blank" class="github-link-card">
                    <svg viewBox="0 0 24 24" fill="currentColor">
                        <path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/>
                    </svg>
                    <div class="github-link-info">
                        <span class="github-link-label">View on GitHub</span>
                        <span class="github-link-url">${github}</span>
                    </div>
                    <svg class="github-link-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="7" y1="17" x2="17" y2="7"></line>
                        <polyline points="7 7 17 7 17 17"></polyline>
                    </svg>
                </a>
            `;
            }
            
            const contentEl = document.getElementById('projectReadmeContent');
            if (typeof marked !== 'undefined') {
                contentEl.innerHTML = marked.parse(content);
                
                contentEl.querySelectorAll('pre code').forEach((block) => {
                    if (typeof hljs !== 'undefined') {
                        hljs.highlightElement(block);
                    }
                    addCopyButton(block.parentElement);
                });
                
                if (typeof renderMathInElement === 'function') {
                    renderMathInElement(contentEl, {
                        delimiters: [
                            { left: '$$', right: '$$', display: true },
                            { left: '$', right: '$', display: false },
                            { left: '\\[', right: '\\]', display: true },
                            { left: '\\(', right: '\\)', display: false }
                        ]
                    });
                }
            }
        }
        
        function getProjectImageType(projectId) {
            const typeMap = {
                'llm-rag': 'rag',
                'kg-pipeline': 'kg',
                'scheduler': 'scheduler',
                'ml-pipeline': 'pipeline',
                'ai-agents': 'agent',
                'inference-api': 'api',
                'embedding-search': 'search',
                'optim-benchmark': 'benchmark'
            };
            return typeMap[projectId] || 'ai';
        }
        
        function getProjectIcon(type) {
            const icons = {
                'rag': `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                    <polyline points="14 2 14 8 20 8"></polyline>
                    <circle cx="12" cy="15" r="3"></circle>
                    <path d="M12 12v-2M12 18v2"></path>
                </svg>`,
                'kg': `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <circle cx="6" cy="6" r="3"></circle>
                    <circle cx="18" cy="6" r="3"></circle>
                    <circle cx="6" cy="18" r="3"></circle>
                    <circle cx="18" cy="18" r="3"></circle>
                    <line x1="9" y1="6" x2="15" y2="6"></line>
                    <line x1="6" y1="9" x2="6" y2="15"></line>
                    <line x1="18" y1="9" x2="18" y2="15"></line>
                    <line x1="9" y1="18" x2="15" y2="18"></line>
                    <line x1="9" y1="9" x2="15" y2="15"></line>
                </svg>`,
                'scheduler': `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                    <line x1="16" y1="2" x2="16" y2="6"></line>
                    <line x1="8" y1="2" x2="8" y2="6"></line>
                    <line x1="3" y1="10" x2="21" y2="10"></line>
                    <rect x="7" y="14" width="3" height="3" fill="currentColor" opacity="0.3"></rect>
                    <rect x="14" y="14" width="3" height="3" fill="currentColor" opacity="0.3"></rect>
                </svg>`,
                'pipeline': `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <circle cx="5" cy="12" r="3"></circle>
                    <circle cx="19" cy="12" r="3"></circle>
                    <circle cx="12" cy="5" r="2"></circle>
                    <circle cx="12" cy="19" r="2"></circle>
                    <path d="M8 12h8M12 7v10"></path>
                    <path d="M7.5 9.5L10 7M16.5 9.5L14 7M7.5 14.5L10 17M16.5 14.5L14 17"></path>
                </svg>`,
                'agent': `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <circle cx="12" cy="8" r="5"></circle>
                    <path d="M3 21v-2a4 4 0 0 1 4-4h10a4 4 0 0 1 4 4v2"></path>
                    <circle cx="12" cy="8" r="2"></circle>
                    <path d="M12 3v2M9 5.5l1 1M15 5.5l-1 1"></path>
                </svg>`,
                'api': `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <rect x="2" y="3" width="20" height="14" rx="2" ry="2"></rect>
                    <line x1="8" y1="21" x2="16" y2="21"></line>
                    <line x1="12" y1="17" x2="12" y2="21"></line>
                    <polyline points="7 8 9 10 7 12"></polyline>
                    <line x1="11" y1="12" x2="17" y2="12"></line>
                </svg>`,
                'search': `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <circle cx="11" cy="11" r="8"></circle>
                    <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                    <path d="M8 8l6 6M14 8l-6 6" opacity="0.3"></path>
                </svg>`,
                'benchmark': `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <line x1="18" y1="20" x2="18" y2="10"></line>
                    <line x1="12" y1="20" x2="12" y2="4"></line>
                    <line x1="6" y1="20" x2="6" y2="14"></line>
                    <polyline points="3 17 9 11 13 15 21 7"></polyline>
                    <polyline points="17 7 21 7 21 11"></polyline>
                </svg>`,
                'ai': `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <circle cx="12" cy="12" r="3"></circle>
                    <path d="M12 1v4M12 19v4M4.22 4.22l2.83 2.83M16.95 16.95l2.83 2.83M1 12h4M19 12h4M4.22 19.78l2.83-2.83M16.95 7.05l2.83-2.83"></path>
                </svg>`
            };
            return icons[type] || icons['ai'];
        }
        
        function addCopyButton(preElement) {
            const wrapper = document.createElement('div');
            wrapper.className = 'code-block-wrapper';
            preElement.parentNode.insertBefore(wrapper, preElement);
            wrapper.appendChild(preElement);
            
            const copyBtn = document.createElement('button');
            copyBtn.className = 'code-copy-btn';
            copyBtn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
            </svg>`;
            copyBtn.title = 'Copy code';
            
            copyBtn.addEventListener('click', async () => {
                const code = preElement.querySelector('code').textContent;
                await navigator.clipboard.writeText(code);
                copyBtn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polyline points="20 6 9 17 4 12"></polyline>
                </svg>`;
                copyBtn.classList.add('copied');
                setTimeout(() => {
                    copyBtn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                        <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                    </svg>`;
                    copyBtn.classList.remove('copied');
                }, 2000);
            });
            
            wrapper.appendChild(copyBtn);
        }
    </script>
</body>
